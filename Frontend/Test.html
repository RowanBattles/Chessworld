<!DOCTYPE html>
<html>
<head>
    <title>SignalR Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/5.0.11/signalr.min.js"></script>
</head>
<body>
    <h1>SignalR Test</h1>
    
    <!-- 🔹 Display Player ID at the top -->
    <div id="playerIdDisplay" style="font-size: 18px; margin-bottom: 10px;">
        Player ID: <span id="playerIdText">Not connected</span>
    </div>

    <button id="connectButton">Connect</button>
    <button id="findGameButton">Find Game</button>
    <button id="leaveGameButton">Leave Game</button>
    <div id="messages"></div>

    <script>
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("http://localhost:5000/gamehub")
            .build();

        let playerId = generateGuid();

        connection.start().then(() => {
            console.log("SignalR connection established");
        }).catch(err => {
            console.error("Error while starting connection: ", err);
        });

        // Display the generated Player ID immediately
        document.getElementById("playerIdText").innerText = playerId;

        document.getElementById("connectButton").addEventListener("click", async () => {
            try {
                await connection.start();
                // 🔹 Update the Player ID display after connecting
                document.getElementById("messages").innerText = `Connected to the hub`;
            } catch (err) {
                console.error(err);
                document.getElementById("messages").innerText = "Failed to connect to the hub.";
            }
        });

        document.getElementById("findGameButton").addEventListener("click", async () => {
            try {
                await connection.invoke("FindGame", { PlayerId: playerId });
            } catch (err) {
                console.error(err);
                document.getElementById("messages").innerText = "Failed to invoke FindGame.";
            }
        });

        document.getElementById("leaveGameButton").addEventListener("click", async () => {
            try {
                await connection.invoke("LeaveGame", { PlayerId: playerId });
            } catch (err) {
                console.error(err);
                document.getElementById("messages").innerText = "Failed to invoke LeaveGame.";
            }
        });

        connection.on("GameFound", (response) => {
            console.log(response);  // Check if this prints the correct data
            document.getElementById("messages").innerText = `Game found! Connected to player ${response.OpponentId}`;
        });

        connection.on("WaitingForOpponent", () => {
            document.getElementById("messages").innerText = "Waiting for an opponent...";
        });

        function generateGuid() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
    </script>
</body>
</html>
