<!DOCTYPE html>
<html>
<head>
    <title>SignalR Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/5.0.11/signalr.min.js"></script>
</head>
<body>
    <h1>SignalR Test</h1>

    <button id="connectButton">Connect</button>
    <button id="findGameButton">Find Game</button>
    <button id="leaveGameButton">Leave Game</button>
    <div id="messages"></div>
    <!-- Add an element to display the playerId -->
    <div id="playerIdDisplay"></div>

    <script>
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("http://localhost:5000/gamehub")
            .build();

        let playerId = null; // Declare playerId globally

        // Listen for the "ReceivePlayerId" event from the server
        connection.on("ReceivePlayerId", (receivedPlayerId) => {
            // Store the received playerId in the global variable
            playerId = receivedPlayerId;

            // Log the received playerId to the console
            console.log("Player ID received from server:", playerId);

            // Update the UI with the playerId
            document.getElementById("playerIdDisplay").innerText = `Player ID: ${playerId}`;
        });

        document.getElementById("connectButton").addEventListener("click", async () => {
            try {
                await connection.start();
                // 🔹 Update the UI after connecting
                document.getElementById("messages").innerText = `Connected to the hub`;

                // Log connection details
                console.log("Connection established, connectionId:", connection.connectionId);
            } catch (err) {
                console.error(err);
                document.getElementById("messages").innerText = "Failed to connect to the hub.";
            }
        });

        document.getElementById("findGameButton").addEventListener("click", async () => {
            if (playerId === null) {
                document.getElementById("messages").innerText = "Player ID is not set. Please connect first.";
                return;
            }

            try {
                // Invoke the FindGame method and pass the playerId
                await connection.invoke("FindGame", { PlayerId: playerId });
            } catch (err) {
                console.error(err);
                document.getElementById("messages").innerText = "Failed to invoke FindGame.";
            }
        });

        document.getElementById("leaveGameButton").addEventListener("click", async () => {
            if (playerId === null) {
                document.getElementById("messages").innerText = "Player ID is not set. Please connect first.";
                return;
            }

            try {
                // Invoke the LeaveGame method and pass the playerId
                await connection.invoke("LeaveGame", { PlayerId: playerId });
            } catch (err) {
                console.error(err);
                document.getElementById("messages").innerText = "Failed to invoke LeaveGame.";
            }   
        });

        connection.on("GameFound", (response) => {
            console.log(response);
            document.getElementById("messages").innerText = `Game found! Connected to player ${response}`;
        });

        connection.on("WaitingForOpponent", () => {
            document.getElementById("messages").innerText = "Waiting for an opponent...";
        });

        connection.on("GameLeft", (response) => {
            console.log(response);
            document.getElementById("messages").innerText = `${response}`;
        });
    </script>
</body>
</html>
