services:
  gameservice:
    container_name: gameservice
    build:
      context: ./GameService
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - chess-network

  apigateway:
    container_name: apigateway
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
    depends_on:
      - gameservice 
    networks:
      - chess-network

networks:
  chess-network:
    external: true
